<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Web app</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <button id="darkModeToggle" class="bg-blue-500 hover:bg-blue-600 transition text-white px-4 py-2 rounded">
    Modo Oscuro
  </button>
  <header>
    <meta charset="UTF-8">
    <header class="bg-gray-800 text-white p-4">
  <h1 class="text-2xl font-bold">Web app</h1>
</header>
  <style type="text/tailwindcss">
@layer components {
  .platino {
    @apply p-4;
  }
}
</style>
    <script src="https://cdn.tailwindcss.com"></script>
  </header>
  <main>
    <aside>
      <h2 class="flex-1 p-3">Menú</h2>
      <ul>
        <li class="flex-1 p-3">Inicio</li>
        <li class="flex-1 p-3">Juegos al 100%</li>
        <li class="flex-1 p-3">Por completar</li>
      </ul>
    </aside>

    <div class="contenido">
      <section class="juegos-al-100">
                 <form id="form-juego">
  <input type="text" id="input-juego" placeholder="Nombre del juego" required
class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
>
  <input type="text" id="input-descripcion" placeholder="Descripción" 
class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
>
  <input type="number" id="input-porcentaje" placeholder="Porcentaje" min="0" max="100"
class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
>
  <button type="submit">Añadir</button>
  
</form>
      <h3>Lista de juegos al 100%</h3>
<section id="lista-juegos-100">
</section>

      <h3>Lista de juegos por completar</h3>
<section id="lista-juegos-incompletos">
</section> 

    </section>
    </div> 
  </main>
  <script src="app.js"></script>
</body>
</html>
