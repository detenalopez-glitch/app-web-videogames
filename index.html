<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Web app</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-black dark:text-white box-border font-principal m-2.5 p-1.5">
  <div class="flex items-center gap-4 p-4">
    <!-- Botón para abrir menú -->
    <button id="menuToggle" class="bg-gray-800 text-white rounded-full p-3 shadow-lg focus:outline-none">
      <span style="font-size: 1.5rem;">☰</span>
    </button>
    <!-- Botón para alternar el modo claro/oscuro -->
    <button id="darkModeToggle" class="bg-blue-500 dark:bg-blue-700 hover:bg-blue-600 dark:hover:bg-blue-800 transition text-white px-4 py-2 rounded">Modo Oscuro</button>
    <!-- Input buscador -->
    <input type="text" id="buscador-juegos" placeholder="Buscar juego..." class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400 dark:focus:ring-blue-700" style="min-width:200px;">
  </div>
  <header class="bg-gray-800 dark:bg-gray-900 text-white">
   
  </header>
  <main class="flex min-h-[80vh]">
    <!-- Sidebar desplegable -->
    <aside
  id="sidebarMenu"
  class="fixed top-0 left-0 h-full w-64 shadow-xl z-40 transition-transform duration-300 transform -translate-x-full"
  style="background:#111;color:#fff;box-shadow:0 0 20px #000a;">
      <div class="flex items-center p-4 border-b border-gray-700">
        <span class="font-bold text-xl">Menú</span>
      </div>
      <ul class="space-y-2 p-4">
        <li class="p-2 hover:bg-gray-700 rounded cursor-pointer transition" id="menuInicio">Inicio</li>
        <li class="p-2 hover:bg-gray-700 rounded cursor-pointer transition" id="menuJuegos100">Juegos al 100%</li>
        <li class="p-2 hover:bg-gray-700 rounded cursor-pointer transition" id="menuPorCompletar">Por completar</li>
      </ul>
    </aside>
    <div class="contenido flex-1 p-6 flex flex-col gap-4">
      <!-- Sección principal de gestión de juegos -->
      <section class="juegos-al-100 flex flex-col gap-4">
                <!-- Filtros de estado -->
                <div class="flex gap-4 mb-4">
                  <label class="flex items-center gap-2">
                    <input type="radio" name="filtro-estado" id="filtro-todos" value="todos" checked>
                    Todos
                  </label>
                  <label class="flex items-center gap-2">
                    <input type="radio" name="filtro-estado" id="filtro-completados" value="completados">
                    Completados
                  </label>
                  <label class="flex items-center gap-2">
                    <input type="radio" name="filtro-estado" id="filtro-incompletos" value="incompletos">
                    Por completar
                  </label>
                </div>
        <!-- Formulario para añadir juegos a la lista -->
        <form id="form-juego" class="flex flex-wrap gap-2">
          <input
            type="text"
            id="input-juego"
            placeholder="Nombre del juego"
            required
            class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400 dark:focus:ring-blue-700"
          >
          <input
            type="text"
            id="input-descripcion"
            placeholder="Descripción"
            class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400 dark:focus:ring-blue-700"
          >
          <input
            type="number"
            id="input-porcentaje"
            placeholder="Porcentaje"
            min="0"
            max="100"
            class="border p-2 rounded w-28 focus:outline-none focus:ring-2 focus:ring-blue-400 dark:focus:ring-blue-700"
          >
          <button
            type="submit"
            class="bg-green-500 dark:bg-green-700 hover:bg-green-600 dark:hover:bg-green-800 transition text-white px-4 py-2 rounded"
          >
            Añadir
          </button>
        </form>

        <!-- Lista de juegos completados al 100% -->
        <div class="bg-black bg-opacity-60 rounded-xl p-8 mb-8">
          <h3 class="text-xl font-bold mb-4">Lista de juegos al 100%</h3>
          <section id="lista-juegos-100" class="flex flex-col gap-2"></section>
        </div>

        <!-- Lista de juegos aún por completar -->
        <div class="bg-black bg-opacity-60 rounded-xl p-8 mb-8">
          <h3 class="text-xl font-bold mb-4">Lista de juegos por completar</h3>
          <section id="lista-juegos-incompletos" class="flex flex-col gap-2"></section>
        </div>
      </section>
    </div>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
